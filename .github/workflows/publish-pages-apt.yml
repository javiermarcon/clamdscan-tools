name: Publish Pages and APT

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install build and publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg devscripts debhelper build-essential texinfo
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material

      - name: Import APT signing key
        env:
          APTLY_GPG_PRIVATE_KEY: ${{ secrets.APTLY_GPG_PRIVATE_KEY }}
        run: |
          test -n "${APTLY_GPG_PRIVATE_KEY}"
          mkdir -p "${HOME}/.gnupg"
          chmod 700 "${HOME}/.gnupg"
          printf '%s\n' "${APTLY_GPG_PRIVATE_KEY}" > /tmp/aptly-private.key.asc
          gpg --batch --import /tmp/aptly-private.key.asc
          rm -f /tmp/aptly-private.key.asc

      - name: Build Debian package
        run: |
          make package

      - name: Initialize aptly repository
        run: |
          bash packaging/apt/init-repo.sh

      - name: Add Debian packages to aptly
        run: |
          bash packaging/apt/add-packages.sh dist

      - name: Publish signed aptly repository
        env:
          APTLY_GPG_KEY_ID: ${{ secrets.APTLY_GPG_KEY_ID }}
          APTLY_GPG_PASSPHRASE: ${{ secrets.APTLY_GPG_PASSPHRASE }}
        run: |
          bash packaging/apt/publish-repo.sh

      - name: Build MkDocs site
        run: |
          mkdocs build --strict

      - name: Export APT repository and public key into site/
        run: |
          bash packaging/apt/export-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
