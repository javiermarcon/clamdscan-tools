name: Build deb

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential lintian shellcheck

      - name: Shellcheck
        run: |
          shellcheck -x bin/clamdscan-progress
          shellcheck -x bin/clamdscan-watch
          shellcheck -x lib/clamdscan-tools.sh
          shellcheck -x debian/postinst
          shellcheck -x debian/prerm
          shellcheck -x debian/postrm

      - name: Build deb
        run: |
          make package

      - name: Upload deb artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: clamdscan-tools-deb
          path: dist/*.deb

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: List collected artifacts
        if: ${{ env.ACT }}
        run: |
          ls -l dist
