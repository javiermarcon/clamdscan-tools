name: Build deb

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential lintian shellcheck

      - name: Shellcheck
        run: |
          shellcheck -x bin/clamdscan-progress
          shellcheck -x bin/clamdscan-watch
          shellcheck -x lib/clamdscan-tools.sh
          shellcheck -x debian/postinst
          shellcheck -x debian/prerm
          shellcheck -x debian/postrm

      - name: Build deb
        run: |
          make package

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb dist/

      - name: Upload deb artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v6
        with:
          name: clamdscan-tools-deb
          path: dist/*.deb

      - name: List collected artifacts
        if: ${{ env.ACT }}
        run: |
          ls -l dist
