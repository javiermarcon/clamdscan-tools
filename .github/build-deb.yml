name: Build deb

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential lintian shellcheck

      - name: Shellcheck
        run: |
          shellcheck bin/clamdscan-progress
          shellcheck bin/clamdscan-watch
          shellcheck lib/clamdscan-tools.sh
          shellcheck debian/postinst
          shellcheck debian/prerm
          shellcheck debian/postrm

      - name: Build deb
        run: |
          debuild -us -uc

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: clamdscan-tools-deb
          path: ../*.deb
